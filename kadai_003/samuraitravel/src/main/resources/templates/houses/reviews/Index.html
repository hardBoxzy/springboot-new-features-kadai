<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
   <head>
       <div th:replace="~{fragment :: meta}"></div>   
            
       <div th:replace="~{fragment :: styles}"></div>
       
       <title>レビュー一覧</title>       
   </head>
   <body>
       <div class="samuraitravel-wrapper">
           <!-- ヘッダー -->
           <div th:replace="~{fragment :: header}"></div>
           
           <main>
               <div class="container pt-4 pb-5 samuraitravel-container">
                   <div class="row justify-content-center">
                       <div class="col-xl-9 col-lg-10 col-md-11">
						   
						   <nav class="mb-4" style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb">
                               <ol class="breadcrumb mb-0">
								   <li class="breadcrumb-item"><a th:href="@{/}">ホーム</a></li> 
								   <li class="breadcrumb-item"><a th:href="@{/houses}">民宿一覧</a></li>  
								   <li class="breadcrumb-item"><a th:href="@{/houses/__${house.getId()}__}">民宿詳細</a></li>
								                                                             
                                   <li class="breadcrumb-item active" aria-current="page">レビュー一覧</li>
                               </ol>
                           </nav> 
                           
                           <h1 class="mb-4 text-center" th:text="|${house.name}のレビュー一覧|">のレビュー一覧</h1>
                           <div class="form-group d-flex justify-content-center my-4">
	                        	<a th:href="@{/houses/__${house.getId()}__/reviews/register}" class="btn text-white shadow-sm w-50 samuraitravel-btn" sec:authorize="!isAnonymous()">レビューを投稿する</a>
	                       </div>         
                           <div th:if="${successMessage}" class="alert alert-info">
<!--								レビュー削除済みメッセージ-->
                                <span th:text="${successMessage}"></span>
                            </div>
                            
                            <div th:if="${#lists.size(reviewPage) > 0}" class="row row-cols-lg-2 row-cols-2 g-6 mb-1">
								<div th:each="newReview : ${reviewPage}" class="col mb-4">
		                            <div class="card h-100">	
										<div class="card-body">                                       
		                                    <!-- ▼ タイトルとボタンを横並び＆両端に配置（右上になります） -->
										    <div class="d-flex justify-content-between align-items-baseline mb-2">
										        <h3 class="card-title mb-0" th:text="${newReview.getUser().getName()}">侍 花子</h3>
										        
												<div sec:authorize="isAuthenticated()">
												    <!-- 2. ログインしている安全な状態なので、安心しての比較を行います -->
												    <div th:if="${newReview.getUser().getName() == #authentication.principal.user.name}">
												        <a th:href="@{/houses/__${house.getId()}__/reviews/__${newReview.getId()}__/edit}" class="me-2 small">編集</a>
												        <a href="#" class="samuraitravel-link-danger small" data-bs-toggle="modal" th:data-bs-target="${'#deleteReviewModal' + newReview.getId()}">削除</a>
												    </div>
												</div>
										    </div>
										    
		                                    <p class="card-text mb-0 score" 
											   th:text="${#strings.repeat('&#9733;', newReview.getScore()) + #strings.repeat('&#9734;', 5 - newReview.getScore())}">
											    ★★★☆☆
											</p>
		                                     <p class="card-text mb-2">
                                            	<small class="text-muted" th:text="${#dates.format(newReview.getCreatedAt(), 'yyyy年MM月dd日')}">2023年04月17日</small>                                            
                                        	</p>
		                                    <p class="card-text" th:text="${newReview.getContent()}">良かったです。</p>
		                                 </div> 
		                            </div>
		                            
<!--		                             削除用モーダル -->
		                             <div sec:authorize="isAuthenticated()">
			                            <div class="modal fade" th:id="${'deleteReviewModal' + newReview.getId()}" tabindex="-1" th:aria-labelledby="${'deleteReviewModalLabel' + newReview.getId()}">
			                                <div class="modal-dialog">
			                                    <div class="modal-content">
			                                        <div class="modal-header">
			                                            <h5 class="modal-title" th:id="${'deleteReviewModalLabel' + newReview.getId()}" th:text="|${house.name}のレビューを削除してもよろしいですか？|"></h5>
			                                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="閉じる"></button>
			                                        </div>
			                                        <div class="modal-footer">
			                                            <form method="post"th:action="@{/houses/__${house.getId()}__/reviews/__${newReview.getId()}__/delete}">
			                                                <button type="submit" class="btn samuraitravel-btn-danger text-white shadow-sm">削除</button>
			                                            </form>
			                                        </div>
			                                    </div>
			                                </div>
			                               </div>
		                            </div> <!-- モーダル  -->	
		                        </div><!-- ループ終わり -->		                        
	                        </div>
                               <!-- ページネーション -->
                            <div th:if="${reviewPage.getTotalPages() > 1}" class="d-flex justify-content-center">
                                <nav aria-label="民宿一覧ページ">
                                    <ul class="pagination">
                                        <li class="page-item">
                                            <span th:if="${reviewPage.isFirst()}" class="page-link disabled">前</span>
                                             <a th:unless="${reviewPage.isFirst()}" th:href="@{/houses/__${house.getId()}__/reviews(page = ${reviewPage.getNumber() - 1})}" class="page-link samuraitravel-page-link">前</a>
                                        </li>
                                        <li th:each="i : ${#numbers.sequence(0, reviewPage.getTotalPages() - 1)}" class="page-item">
                                            <span th:if="${i == reviewPage.getNumber()}" class="page-link active samuraitravel-active" th:text="${i + 1}"></span>
                                             <a th:unless="${i == reviewPage.getNumber()}" th:href="@{/houses/__${house.getId()}__/reviews(page = ${i})}" class="page-link samuraitravel-page-link" th:text="${i + 1}"></a>
                                        </li>
                                        <li class="page-item">                        
                                            <span th:if="${reviewPage.isLast()}" class="page-link disabled">次</span>
                                             <a th:unless="${reviewPage.isLast()}" th:href="@{/houses/__${house.getId()}__/reviews(page = ${reviewPage.getNumber() + 1})}" class="page-link samuraitravel-page-link">次</a>
                                        </li>
                                    </ul>
                                </nav> 
                            </div>
                                                                                                  
                       </div>
                   </div>
               </div>                
           </main>
           
           <!-- フッター -->
           <div th:replace="~{fragment :: footer}"></div>
       </div>    
       
       <div th:replace="~{fragment :: scripts}"></div>  
       <script th:src="@{/js/preview.js}"></script>     
   </body>
</html>
